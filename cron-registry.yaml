# GT Mesh Cron Registry
# ALL cron jobs must be registered here. Unregistered crons are killed on audit.
# Format: name, schedule, command, owner, purpose, created, expires (optional)
# Updated: 2026-03-12 — synced with actual crontab

crons:
  dolthub-sync:
    schedule: "*/2 * * * *"
    command: "/home/pratham2/gt/mayor/sync-dolthub.sh >> /tmp/dolthub-sync.log 2>&1"
    owner: "gt-local"
    purpose: "Sync DoltHub mail database for cross-GT communication"
    created: "2026-03-06"

  mesh-sync:
    schedule: "1-59/2 * * * *"
    command: "GT_ROOT=/home/pratham2/gt MESH_YAML=/home/pratham2/gt/mesh.yaml /bin/bash /home/pratham2/gt/.gt-mesh/scripts/mesh-sync.sh >> /tmp/gt-mesh-sync.log 2>&1"
    owner: "gt-local"
    purpose: "Mesh heartbeat, knowledge sync, mail handler trigger (offset 1m from dolthub-sync)"
    created: "2026-03-06"

  mayor-work-dispatcher:
    schedule: "*/5 * * * *"
    command: "GT_ROOT=/home/pratham2/gt MESH_YAML=/home/pratham2/gt/mesh.yaml bash /home/pratham2/gt/.gt-mesh/scripts/mayor-work-dispatcher.sh >> /tmp/mayor-dispatcher.log 2>&1"
    owner: "gt-local"
    purpose: "Check idle workers, dispatch beads, monitor Gitea PRs"
    created: "2026-03-11"

  mesh-improve-review:
    schedule: "*/10 * * * *"
    command: "GT_ROOT=/home/pratham2/gt MESH_YAML=/home/pratham2/gt/mesh.yaml bash /home/pratham2/gt/.gt-mesh/scripts/mesh-improve.sh review >> /tmp/mesh-improve.log 2>&1"
    owner: "gt-local"
    purpose: "Self-improving loop: review and graduate improvements"
    created: "2026-03-06"

  mesh-autosync-digest:
    schedule: "0 */2 * * *"
    command: "GT_ROOT=/home/pratham2/gt MESH_YAML=/home/pratham2/gt/mesh.yaml bash /home/pratham2/gt/.gt-mesh/scripts/mesh-auto-sync.sh digest >> /tmp/mesh-autosync.log 2>&1"
    owner: "gt-local"
    purpose: "Broadcast work digest to mesh peers every 2 hours"
    created: "2026-03-06"

  cron-audit:
    schedule: "0 6 * * *"
    command: "bash /home/pratham2/gt/.gt-mesh/scripts/cron-audit.sh --report-only >> /tmp/cron-audit.log 2>&1"
    owner: "gt-local"
    purpose: "Daily audit: report crontab vs registry drift (report-only mode)"
    created: "2026-03-06"

  mesh-mayor-daemon:
    schedule: "*/10 * * * *"
    command: "bash /home/pratham2/gt/.gt-mesh/scripts/mesh-mayor-daemon.sh >> /tmp/mesh-mayor-daemon.log 2>&1"
    owner: "gt-local"
    purpose: "Process mesh inbox"
    created: "2026-03-08"

  mesh-pack-updater:
    schedule: "0 */2 * * *"
    command: "bash /home/pratham2/gt/.gt-mesh/scripts/mesh-pack-updater.sh >> /tmp/mesh-pack-updater.log 2>&1"
    owner: "gt-local"
    purpose: "Update blueprint packs from DoltHub"
    created: "2026-03-08"

  mesh-inbox:
    schedule: "*/5 * * * *"
    command: "GT_ROOT=/home/pratham2/gt MESH_YAML=/home/pratham2/gt/mesh.yaml bash /home/pratham2/gt/.gt-mesh/scripts/mesh-inbox.sh >> /tmp/mesh-inbox.log 2>&1"
    owner: "gt-local"
    purpose: "Process mesh inbox messages"
    created: "2026-03-11"

# ===========================================================================
# DISABLED CRONS — kept for reference
# ===========================================================================

disabled_crons:
  deacon-pr-review:
    schedule: "*/30 * * * *"
    command: "bash /home/pratham2/gt/.gt-mesh/scripts/deacon-pr-review.sh"
    owner: "gt-local"
    purpose: "Auto-review and merge approved PRs across Deepwork-AI repos"
    created: "2026-03-06"
    disabled: "2026-03-11"
    reason: "GitHub auth removed — all PR work uses Gitea now"

  mesh-github-sync:
    schedule: "0 6 * * *"
    command: "bash /home/pratham2/gt/.gt-mesh/scripts/mesh-github-sync.sh"
    owner: "gt-local"
    purpose: "Daily sync to GitHub public repos"
    created: "2026-03-08"
    disabled: "2026-03-11"
    reason: "GitHub auth removed"

  mesh-work-watchdog:
    schedule: "*/5 * * * *"
    command: "bash /home/pratham2/gt/.gt-mesh/scripts/mesh-work-watchdog.sh"
    owner: "gt-local"
    purpose: "Check gasclaw container sessions alive, restart if dead"
    created: "2026-03-08"
    disabled: "2026-03-11"
    reason: "Replaced by mayor-work-dispatcher.sh"

  worker-flywheel:
    schedule: "*/15 * * * *"
    command: "/home/pratham2/gt/mayor/worker-flywheel.sh >> /tmp/worker-flywheel.log 2>&1"
    owner: "gt-local"
    purpose: "Worker session health monitoring"
    created: "2026-03-08"
    disabled: "2026-03-11"
    reason: "Buggy zombie detection kills healthy Kimi sessions"

# ===========================================================================
# WORKER CRONS — auto-installed on mesh join via cron-audit.sh --enforce
# These use $GT_ROOT and $MESH_YAML which resolve per-instance.
# Path prefix: /workspace/gt (Docker) or $GT_ROOT (bare metal)
# ===========================================================================

worker_crons:
  worker-mesh-sync:
    schedule: "*/2 * * * *"
    command: "GT_ROOT=$GT_ROOT MESH_YAML=$GT_ROOT/mesh.yaml bash $GT_ROOT/.gt-mesh/scripts/mesh-sync.sh >> /tmp/mesh-sync.log 2>&1"
    owner: "worker"
    purpose: "Mesh heartbeat + DoltHub sync"
    created: "2026-03-09"

  worker-inbox-check:
    schedule: "*/5 * * * *"
    command: "GT_ROOT=$GT_ROOT MESH_YAML=$GT_ROOT/mesh.yaml bash $GT_ROOT/.gt-mesh/scripts/mesh-inbox.sh >> /tmp/mesh-inbox.log 2>&1"
    owner: "worker"
    purpose: "Check inbox for work assignments from coordinator"
    created: "2026-03-09"

  worker-watchdog:
    schedule: "*/5 * * * *"
    command: "GT_ROOT=$GT_ROOT MESH_YAML=$GT_ROOT/mesh.yaml bash $GT_ROOT/.gt-mesh/scripts/mesh-work-watchdog.sh >> /tmp/mesh-watchdog.log 2>&1"
    owner: "worker"
    purpose: "Check for stale claims, idle sessions, restart if needed"
    created: "2026-03-09"

  worker-autosync-digest:
    schedule: "0 */2 * * *"
    command: "GT_ROOT=$GT_ROOT MESH_YAML=$GT_ROOT/mesh.yaml bash $GT_ROOT/.gt-mesh/scripts/mesh-auto-sync.sh digest >> /tmp/mesh-autosync.log 2>&1"
    owner: "worker"
    purpose: "Broadcast activity digest to coordinator"
    created: "2026-03-09"

  worker-cron-audit:
    schedule: "0 6 * * *"
    command: "bash $GT_ROOT/.gt-mesh/scripts/cron-audit.sh --report-only >> /tmp/cron-audit.log 2>&1"
    owner: "worker"
    purpose: "Daily audit: report crontab vs registry drift"
    created: "2026-03-09"
